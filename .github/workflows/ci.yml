name: CI — Validate Plugin Structure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate plugin structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install "pyyaml>=6.0,<7" "pytest>=8,<10"

      - name: Run plugin structure validation
        run: python3 scripts/validate.py

      - name: Run tests
        run: python3 -m pytest tests/ -v
